<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>ぷよぷよ — Neon Edition</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='%23ff4d6d'/><circle cx='12' cy='14' r='2.5' fill='%231a0030'/><circle cx='20' cy='14' r='2.5' fill='%231a0030'/></svg>"/>
</head>
<body>
  <div id="app">
    <!-- Board -->
    <div id="board-wrap">
      <canvas id="game-canvas"></canvas>
      <!-- Overlay: shared by title screen and game-over screen -->
      <div id="overlay" class="visible">
        <div class="overlay-title" id="overlay-title">PUYO PUYO</div>
        <div class="overlay-sub" id="overlay-subtitle">NEON EDITION</div>
        <div id="overlay-score-wrap">
          <div class="overlay-sub">SCORE</div>
          <div class="overlay-score" id="final-score">0</div>
        </div>
        <button id="start-btn">PRESS START</button>
        <div class="overlay-sub" style="font-size:11px">or press Enter</div>
      </div>
    </div>

    <!-- Side panel -->
    <div id="panel">
      <div id="title">PUYO PUYO<br>NEON</div>

      <div class="card">
        <div class="card-label">Score</div>
        <div class="card-value" id="score">0</div>
      </div>

      <div class="card">
        <div class="card-label">Best</div>
        <div class="card-value" id="hi-score">0</div>
      </div>

      <div class="card">
        <div class="card-label">Level</div>
        <div class="card-value" id="level">1</div>
      </div>

      <div class="card" id="chain-badge">
        <div class="card-label">Chain</div>
        <div id="chain">0×</div>
      </div>

      <div class="card" id="next-wrap">
        <div class="card-label">Next</div>
        <canvas id="next-canvas"></canvas>
      </div>

      <div class="card" id="controls">
        <div class="card-label">Controls</div>
        <div style="display:flex;flex-direction:column;gap:4px;margin-top:6px">
          <div class="ctrl-row"><span><kbd>←</kbd><kbd>→</kbd></span><span style="font-size:10px">Move</span></div>
          <div class="ctrl-row"><span><kbd>↓</kbd></span><span style="font-size:10px">Soft drop</span></div>
          <div class="ctrl-row"><span><kbd>Space</kbd></span><span style="font-size:10px">Hard drop</span></div>
          <div class="ctrl-row"><span><kbd>X</kbd></span><span style="font-size:10px">Rotate CW</span></div>
          <div class="ctrl-row"><span><kbd>Z</kbd></span><span style="font-size:10px">Rotate CCW</span></div>
          <div class="ctrl-row"><span><kbd>M</kbd></span><span style="font-size:10px">Mute</span></div>
        </div>
      </div>

      <button id="mute-btn" class="mute-btn"><span id="mute-icon">🔊</span> Sound</button>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
